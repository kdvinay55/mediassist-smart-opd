<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vitals Kiosk - Fever + High BP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #1a0a0a; 
    color: #fff; 
    font-family: 'Segoe UI', 'Arial', sans-serif;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
    padding: 20px;
  }
  .kiosk {
    background: linear-gradient(145deg, #1f0f0f, #1a0a0a);
    border: 2px solid #5c1a1a;
    border-radius: 16px;
    width: 480px;
    padding: 32px;
    box-shadow: 0 0 40px rgba(255,60,60,0.15);
  }
  .header {
    text-align: center;
    border-bottom: 1px solid #5c1a1a;
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .header h1 { font-size: 20px; color: #ef5350; letter-spacing: 2px; }
  .header .sub { font-size: 11px; color: #7a5a5a; margin-top: 4px; }
  .vital {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .vital:last-of-type { border-bottom: none; }
  .vital .label { font-size: 13px; color: #8a6a6a; text-transform: uppercase; letter-spacing: 1px; }
  .vital .val { font-size: 24px; font-weight: 700; }
  .vital .unit { font-size: 12px; color: #7a5a5a; margin-left: 4px; }
  .vital .warn { font-size: 9px; color: #ef5350; margin-left: 8px; font-weight: 700; }
  .vital.alert { background: rgba(239,83,80,0.06); border-radius: 8px; }
  .bp .val { color: #ef5350; }
  .hr .val { color: #ffa726; }
  .temp .val { color: #ef5350; }
  .spo2 .val { color: #66bb6a; }
  .rr .val { color: #ce93d8; }
  .wt .val { color: #90a4ae; }
  .ht .val { color: #78909c; }
  .bs .val { color: #ffb74d; }
  .status { 
    text-align: center; 
    margin-top: 16px; 
    padding: 10px; 
    background: rgba(239,83,80,0.1); 
    border: 1px solid rgba(239,83,80,0.4); 
    border-radius: 8px;
    color: #ef5350;
    font-size: 12px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .footer { text-align: center; margin-top: 12px; font-size: 10px; color: #5a3a3a; }
</style>
</head>
<body>
<div class="kiosk">
  <div class="header">
    <h1>SMART VITALS KIOSK</h1>
    <div class="sub">Patient Vitals Monitor</div>
  </div>
  <div class="vital bp alert">
    <span class="label">Blood Pressure</span>
    <span><span class="val">158/102</span><span class="unit">mmHg</span><span class="warn">HIGH</span></span>
  </div>
  <div class="vital hr">
    <span class="label">Heart Rate</span>
    <span><span class="val">98</span><span class="unit">bpm</span><span class="warn">ELEVATED</span></span>
  </div>
  <div class="vital temp alert">
    <span class="label">Temperature</span>
    <span><span class="val">102.4</span><span class="unit">°F</span><span class="warn">FEVER</span></span>
  </div>
  <div class="vital spo2">
    <span class="label">SpO2</span>
    <span><span class="val">96</span><span class="unit">%</span></span>
  </div>
  <div class="vital rr">
    <span class="label">Respiratory Rate</span>
    <span><span class="val">22</span><span class="unit">/min</span></span>
  </div>
  <div class="vital wt">
    <span class="label">Weight</span>
    <span><span class="val">85</span><span class="unit">kg</span></span>
  </div>
  <div class="vital ht">
    <span class="label">Height</span>
    <span><span class="val">165</span><span class="unit">cm</span></span>
  </div>
  <div class="vital bs alert">
    <span class="label">Blood Sugar</span>
    <span><span class="val">145</span><span class="unit">mg/dL</span><span class="warn">ELEVATED</span></span>
  </div>
  <div class="status">ATTENTION REQUIRED — ABNORMAL VALUES</div>
  <div class="footer">SRM BioVault Kiosk v2.1</div>
</div>
</body>
</html>
