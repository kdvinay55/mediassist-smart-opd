<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vitals Kiosk - Elderly Diabetic Patient</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #f8fafc; 
    color: #1e293b; 
    font-family: 'Segoe UI', 'Arial', sans-serif;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
    padding: 20px;
  }
  .kiosk {
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    width: 480px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .header {
    text-align: center;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .header h1 { font-size: 20px; color: #0f172a; }
  .header .sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .vital {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 16px;
    border-bottom: 1px solid #f1f5f9;
  }
  .vital:last-of-type { border-bottom: none; }
  .vital .label { font-size: 13px; color: #64748b; font-weight: 500; }
  .vital .val { font-size: 24px; font-weight: 700; color: #0f172a; }
  .vital .unit { font-size: 12px; color: #94a3b8; margin-left: 4px; }
  .vital .flag { font-size: 9px; margin-left: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .flag.high { background: #fef2f2; color: #dc2626; }
  .flag.low { background: #fefce8; color: #ca8a04; }
  .status { 
    text-align: center; 
    margin-top: 16px; 
    padding: 10px; 
    background: #fef9c3; 
    border: 1px solid #fde047; 
    border-radius: 8px;
    color: #a16207;
    font-size: 12px;
    font-weight: 600;
  }
  .footer { text-align: center; margin-top: 12px; font-size: 10px; color: #cbd5e1; }
</style>
</head>
<body>
<div class="kiosk">
  <div class="header">
    <h1>SMART VITALS KIOSK</h1>
    <div class="sub">Patient Vitals Monitor</div>
  </div>
  <div class="vital">
    <span class="label">Blood Pressure</span>
    <span><span class="val">148/94</span><span class="unit">mmHg</span><span class="flag high">HIGH</span></span>
  </div>
  <div class="vital">
    <span class="label">Heart Rate</span>
    <span><span class="val">88</span><span class="unit">bpm</span></span>
  </div>
  <div class="vital">
    <span class="label">Temperature</span>
    <span><span class="val">98.2</span><span class="unit">°F</span></span>
  </div>
  <div class="vital">
    <span class="label">SpO2</span>
    <span><span class="val">95</span><span class="unit">%</span></span>
  </div>
  <div class="vital">
    <span class="label">Respiratory Rate</span>
    <span><span class="val">20</span><span class="unit">/min</span></span>
  </div>
  <div class="vital">
    <span class="label">Weight</span>
    <span><span class="val">92</span><span class="unit">kg</span></span>
  </div>
  <div class="vital">
    <span class="label">Height</span>
    <span><span class="val">168</span><span class="unit">cm</span></span>
  </div>
  <div class="vital">
    <span class="label">Blood Sugar</span>
    <span><span class="val">245</span><span class="unit">mg/dL</span><span class="flag high">HIGH</span></span>
  </div>
  <div class="status">REVIEW NEEDED — ELEVATED VALUES DETECTED</div>
  <div class="footer">SRM BioVault Kiosk v2.1</div>
</div>
</body>
</html>
