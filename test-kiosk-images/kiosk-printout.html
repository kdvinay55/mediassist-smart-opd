<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vitals Report - Printout Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #f0f0f0; 
    font-family: 'Courier New', 'Consolas', monospace;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
    padding: 20px;
  }
  .receipt {
    background: #fff;
    width: 420px;
    padding: 32px 28px;
    border: 1px solid #ccc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 12px; margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: bold; }
  .header p { font-size: 11px; color: #666; margin-top: 4px; }
  .row { 
    display: flex; 
    justify-content: space-between; 
    padding: 10px 0; 
    border-bottom: 1px dotted #ccc; 
    font-size: 15px; 
    line-height: 1.4;
  }
  .row:last-of-type { border-bottom: none; }
  .row .label { color: #333; font-weight: normal; }
  .row .val { font-weight: bold; color: #000; }
  .footer { 
    text-align: center; 
    margin-top: 16px; 
    padding-top: 12px; 
    border-top: 2px dashed #333; 
    font-size: 11px; 
    color: #999; 
  }
</style>
</head>
<body>
<div class="receipt">
  <div class="header">
    <h1>VITALS REPORT</h1>
    <p>SRM BioVault Health Kiosk</p>
    <p>Date: 2026-04-12</p>
  </div>
  <div class="row"><span class="label">Blood Pressure:</span> <span class="val">134/88 mmHg</span></div>
  <div class="row"><span class="label">Heart Rate:</span> <span class="val">82 bpm</span></div>
  <div class="row"><span class="label">Temperature:</span> <span class="val">99.8 °F</span></div>
  <div class="row"><span class="label">SpO2:</span> <span class="val">97 %</span></div>
  <div class="row"><span class="label">Respiratory Rate:</span> <span class="val">18 /min</span></div>
  <div class="row"><span class="label">Weight:</span> <span class="val">76 kg</span></div>
  <div class="row"><span class="label">Height:</span> <span class="val">172 cm</span></div>
  <div class="row"><span class="label">Blood Sugar:</span> <span class="val">118 mg/dL</span></div>
  <div class="footer">
    <p>— End of Vitals Report —</p>
    <p>Please show this to the doctor</p>
  </div>
</div>
</body>
</html>
