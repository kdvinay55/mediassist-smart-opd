services:
  - type: web
    name: srm-biovault-api
    runtime: node
    buildCommand: cd server && npm ci && cd ../client && npm ci && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
